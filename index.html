<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>For Anna</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Italiana&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="My_princess/princess1.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Cormorant Garamond',serif;}

#bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
  opacity: 0.3; /* Dims the video details down directly */
}

/* This creates a pure black backdrop behind the video so it fades into darkness */
body {
  background-color: #000000; 
}

/* OR: Add a dark tinted overlay on top of the video for a richer tone */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(10, 12, 20, 0.65); /* Adjust the 0.65 (65%) to make it darker or lighter */
  z-index: -1; /* Sits right above the video, but behind your text/cards */
  pointer-events: none;
}
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
background:linear-gradient(160deg,rgba(8,3,8,.56) 0%,rgba(15,5,12,.44) 50%,rgba(8,3,8,.6) 100%);}

:root{
  --pink:#f7c8d8;
  --pink-2:#e6a0bc;
  --glow:rgba(247,180,210,.5);
  /* TRUE glass — no color fill, just blur on the real video behind */
  --glass:rgba(255,255,255,.08);
  --glass-hover:rgba(255,255,255,.14);
  --border:rgba(255,200,220,.22);
  --shine:rgba(255,255,255,.2);
  --text:#fff5f8;
  --text-dim:rgba(255,220,235,.55);
}

/* Corner ornaments */
.corner{position:fixed;pointer-events:none;z-index:3;width:clamp(70px,8vw,120px);height:clamp(70px,8vw,120px);opacity:.22;}
.corner svg{width:100%;height:100%;}
.corner.tl{top:0;left:0}.corner.tr{top:0;right:0;transform:scaleX(-1)}
.corner.bl{bottom:0;left:0;transform:scaleY(-1)}.corner.br{bottom:0;right:0;transform:scale(-1,-1)}

/* Stage */
.stage{position:relative;z-index:10;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(10px,2vh,20px);padding:24px;text-align:center;}

.eyebrow{font-family:'Italiana',serif;font-size:clamp(.62rem,.9vw,.78rem);letter-spacing:.55em;text-transform:uppercase;color:rgba(255,210,228,.55);animation:fadeUp 1.4s cubic-bezier(.16,1,.3,1) both;}

.hero-title{
  font-family:'Italiana',serif;font-size:clamp(3.4rem,9.5vw,8rem);font-weight:400;
  color:var(--text);letter-spacing:.06em;line-height:1;
  text-shadow:0 2px 60px var(--glow),0 0 120px rgba(247,150,190,.28),0 8px 40px rgba(0,0,0,.5);
  animation:fadeUp 1.6s cubic-bezier(.16,1,.3,1) both;
  display:inline-flex;align-items:center;gap:.2em;
}
.hero-title svg{width:.38em;height:.38em;flex-shrink:0;filter:drop-shadow(0 0 16px rgba(247,190,215,.85));animation:heartbeat 2.8s ease-in-out infinite;}
@keyframes heartbeat{0%,100%{transform:scale(1)}45%{transform:scale(1.25)}60%{transform:scale(1.15)}}

.divider{display:flex;align-items:center;gap:18px;margin:clamp(2px,.8vh,8px) 0;animation:fadeUp 1.8s cubic-bezier(.16,1,.3,1) both;}
.div-line{width:clamp(44px,6vw,90px);height:1px;background:linear-gradient(90deg,transparent,rgba(247,200,220,.6),transparent);}
.div-gem{width:5px;height:5px;background:var(--pink);transform:rotate(45deg);box-shadow:0 0 12px var(--glow);}

.hero-sub{font-style:italic;font-size:clamp(.9rem,1.35vw,1.12rem);color:rgba(255,215,230,.5);letter-spacing:.16em;animation:fadeUp 2s cubic-bezier(.16,1,.3,1) both;}

/* Glass CTA */
.enter-btn{
  margin-top:clamp(16px,2.8vh,30px);position:relative;overflow:hidden;
  padding:clamp(14px,2.2vh,20px) clamp(54px,7vw,92px);
  background:var(--glass);
  backdrop-filter:blur(24px) saturate(180%) brightness(1.1);
  -webkit-backdrop-filter:blur(24px) saturate(180%) brightness(1.1);
  color:var(--text);border:1px solid var(--border);border-radius:100px;cursor:pointer;
  font-family:'Italiana',serif;font-size:clamp(.82rem,1.1vw,.97rem);letter-spacing:.32em;text-transform:uppercase;
  transition:all .4s cubic-bezier(.16,1,.3,1);
  box-shadow:0 8px 40px rgba(0,0,0,.28),inset 0 1px 0 var(--shine),inset 0 -1px 0 rgba(0,0,0,.15);
  animation:fadeUp 2.3s cubic-bezier(.16,1,.3,1) both;
}
.enter-btn::before{content:'';position:absolute;inset:0;border-radius:100px;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 55%,rgba(255,255,255,.05) 100%);pointer-events:none;}
.enter-btn:hover{background:var(--glass-hover);border-color:rgba(247,200,220,.55);box-shadow:0 12px 50px rgba(247,140,190,.35),inset 0 1px 0 rgba(255,255,255,.25);transform:translateY(-3px);}
.enter-btn:active{transform:scale(.97);}

.dot-row{display:flex;gap:clamp(8px,1.4vw,13px);margin-top:clamp(6px,1vh,12px);animation:fadeUp 2.6s cubic-bezier(.16,1,.3,1) both;}
.dp{width:5px;height:5px;border-radius:50%;background:rgba(247,200,220,.3);}
.dp:nth-child(2){background:var(--pink);width:7px;height:7px;box-shadow:0 0 9px var(--glow);}
.dp:nth-child(3){width:4px;height:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Floating petals */
/* Petals */
.petal{position:fixed;pointer-events:none;z-index:2;border-radius:50% 0 50% 0;animation:fall var(--dur,20s) linear infinite var(--del,0s);opacity:0;}
@keyframes fall{0%{transform:translateY(-30px) rotate(0);opacity:0}5%{opacity:.55}88%{opacity:.2}100%{transform:translateY(105vh) translateX(var(--dx,30px)) rotate(var(--rot,280deg));opacity:0}}

</style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="assets/sakura.mp4" type="video/mp4">
</video>

<div class="corner tl"><svg viewBox="0 0 160 160" fill="none"><circle cx="38" cy="118" r="2.5" fill="#f7c8d8"/><circle cx="62" cy="100" r="1.5" fill="#f7c8d8"/><path d="M8 154 Q44 86 94 64" stroke="#f7c8d8" stroke-width=".7" fill="none" opacity=".5"/><path d="M4 126 Q28 102 54 92" stroke="#f7c8d8" stroke-width=".45" fill="none" opacity=".28"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 160 160" fill="none"><circle cx="122" cy="118" r="2.5" fill="#f7c8d8"/><circle cx="98" cy="100" r="1.5" fill="#f7c8d8"/><path d="M152 154 Q116 86 66 64" stroke="#f7c8d8" stroke-width=".7" fill="none" opacity=".5"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 160 160" fill="none"><circle cx="38" cy="42" r="2" fill="#f7c8d8"/><circle cx="68" cy="58" r="1.5" fill="#f7c8d8"/></svg></div>
<div class="corner br"><svg viewBox="0 0 160 160" fill="none"><circle cx="122" cy="42" r="2" fill="#f7c8d8"/></svg></div>

<div class="stage">
  <div class="eyebrow">a quiet thing, just for you</div>
  <h1 class="hero-title">For Anna
    <svg viewBox="0 0 24 24" fill="#f7c8d8"><path d="M12 21s-7.5-4.9-10.2-9.3C-0.3 8.1 1.2 4 5.1 3.2c2.2-.4 4.2.6 5.4 2.4C11.7 3.8 13.7 2.8 15.9 3.2c3.9.8 5.4 4.9 3.3 8.5C19.5 16.1 12 21 12 21z"/></svg>
  </h1>
  <div class="divider"><div class="div-line"></div><div class="div-gem"></div><div class="div-line"></div></div>
  <p class="hero-sub">open whenever you're ready</p>
  <button class="enter-btn" onclick="window.location.href='reveal.html'">Open</button>
  <div class="dot-row"><div class="dp"></div><div class="dp"></div><div class="dp"></div></div>
</div>

<script>
(function(){
  const cols=['#f7c8d8','#f5c0d4','#fce0ec','#f0b8cc','#fad0e0'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div');
    const s=(Math.random()*8+5).toFixed(1);
    const dx=((Math.random()-.5)*120).toFixed(0);
    const rot=(Math.random()*360).toFixed(0);
    p.className='petal';
    p.style.cssText=`width:${s}px;height:${s}px;background:${cols[i%5]};left:${Math.random()*110-5}%;--dur:${(Math.random()*18+14).toFixed(0)}s;--del:-${(Math.random()*20).toFixed(0)}s;--dx:${dx}px;--rot:${rot}deg;`;
    document.body.appendChild(p);
  }
})();
</script>

<script id="sakura-petals">
/* ── SAKURA PETAL CANVAS ── */
(function(){
  const cv=document.createElement("canvas");
  cv.style.cssText="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:4;";
  document.body.appendChild(cv);
  const ctx=cv.getContext("2d");
  let W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener("resize",resize);resize();
  const COLS=["#f7c8d8","#f9d5e2","#f0b0c8","#fce0ec","#f5a8c0","#fdd0e0","#f8e0ea","#e8a0b8"];
  class Petal{
    constructor(init){this.reset(init);}
    reset(init){
      this.x=Math.random()*W*1.1-W*0.05;
      this.y=init?Math.random()*H*1.1-H*0.1:-30-Math.random()*80;
      this.size=Math.random()*9+4;
      this.col=COLS[Math.floor(Math.random()*COLS.length)];
      this.vx=(Math.random()-0.5)*0.9;
      this.vy=Math.random()*1.2+0.5;
      this.rot=Math.random()*Math.PI*2;
      this.rspd=(Math.random()-0.5)*0.04;
      this.wobble=Math.random()*Math.PI*2;
      this.wobbleSpd=Math.random()*0.02+0.008;
      this.wobbleAmp=Math.random()*0.55+0.2;
      this.alpha=Math.random()*0.45+0.3;
      this.petalType=Math.floor(Math.random()*3);
    }
    update(){
      this.wobble+=this.wobbleSpd;
      this.x+=this.vx+Math.sin(this.wobble)*this.wobbleAmp;
      this.y+=this.vy;
      this.rot+=this.rspd;
      if(this.y>H+40||this.x<-60||this.x>W+60)this.reset(false);
    }
    draw(){
      ctx.save();ctx.globalAlpha=this.alpha;ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.fillStyle=this.col;
      const s=this.size;ctx.beginPath();
      if(this.petalType===0){ctx.moveTo(0,0);ctx.bezierCurveTo(-s*.5,-s*.4,-s*.5,-s*1.1,0,-s*1.4);ctx.bezierCurveTo(s*.5,-s*1.1,s*.5,-s*.4,0,0);}
      else if(this.petalType===1){ctx.moveTo(0,0);ctx.bezierCurveTo(-s*.7,-s*.3,-s*.6,-s*1.0,0,-s*1.3);ctx.bezierCurveTo(s*.6,-s*1.0,s*.7,-s*.3,0,0);}
      else{ctx.ellipse(0,-s*.6,s*.38,s*.65,0,0,Math.PI*2);}
      ctx.fill();
      if(this.petalType!==2&&this.size>6){ctx.globalAlpha=this.alpha*0.25;ctx.strokeStyle="#fff";ctx.lineWidth=0.6;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-s*1.1);ctx.stroke();}
      ctx.restore();
    }
  }
  function count(){return Math.round((W*H)/(1920*1080)*90)+30;}
  let petals=[];
  function spawn(){petals=[];const n=count();for(let i=0;i<n;i++)petals.push(new Petal(true));}
  spawn();window.addEventListener("resize",spawn);
  function frame(){ctx.clearRect(0,0,W,H);petals.forEach(p=>{p.update();p.draw();});requestAnimationFrame(frame);}
  frame();
})();
</script>

</body>
</html>
